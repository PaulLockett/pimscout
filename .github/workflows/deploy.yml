name: Deploy
on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build

      # Supabase migrations — only on main (production)
      - uses: supabase/setup-cli@v1
        if: github.ref == 'refs/heads/main'
        with:
          version: latest
      - name: Link Supabase project
        if: github.ref == 'refs/heads/main'
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push database migrations
        if: github.ref == 'refs/heads/main'
        run: |
          if ls supabase/migrations/*.sql 1>/dev/null 2>&1; then
            supabase db push --linked
          else
            echo "No migrations to push — skipping"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # Vercel and Railway auto-deploy from main/staging branches (configured in dashboards)
