name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  # Create/update Supabase preview branch and push migrations
  supabase-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Create or reset preview branch
        id: branch
        run: |
          BRANCH_NAME="pr-${{ github.event.number }}"

          # Check if branch already exists (field is .name, not .git_branch)
          EXISTING=$(supabase branches list --output json \
            | jq -r ".[] | select(.name == \"$BRANCH_NAME\") | .id" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Deleting and recreating branch $EXISTING to pick up new migrations"
            supabase branches delete "$EXISTING" || true
            sleep 5
          fi

          echo "Creating branch $BRANCH_NAME"
          # CLI prefixes "Created preview branch:" before multi-line JSON
          RESULT=$(supabase branches create "$BRANCH_NAME" --output json 2>&1 || true)
          BRANCH_ID=$(echo "$RESULT" | sed -n '/{/,/}/p' | jq -r '.id // empty' 2>/dev/null || echo "")

          if [ -z "$BRANCH_ID" ]; then
            echo "::warning::Could not create Supabase branch. Output: $RESULT"
            echo "branch_id=" >> "$GITHUB_OUTPUT"
          else
            echo "Branch created: $BRANCH_ID"
            echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for branch to be ready
        if: steps.branch.outputs.branch_id != ''
        run: |
          BRANCH_ID="${{ steps.branch.outputs.branch_id }}"
          echo "Waiting for branch $BRANCH_ID to become active..."
          for i in $(seq 1 30); do
            STATUS=$(supabase branches list --output json \
              | jq -r ".[] | select(.id == \"$BRANCH_ID\") | .preview_project_status" 2>/dev/null || echo "")
            echo "  Attempt $i: status=$STATUS"
            if [ "$STATUS" = "ACTIVE_HEALTHY" ]; then
              echo "Branch is ready"
              break
            fi
            sleep 10
          done

      - name: Push migrations to preview branch
        if: steps.branch.outputs.branch_id != ''
        id: push
        run: |
          if ls supabase/migrations/*.sql 1>/dev/null 2>&1; then
            supabase db push --linked
          else
            echo "No migrations to push"
          fi
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Comment PR with preview info
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const branchId = '${{ steps.branch.outputs.branch_id }}';
            const pushOutcome = '${{ steps.push.outcome }}';
            const hasMigrations = ${{ hashFiles('supabase/migrations/*.sql') != '' }};

            let dbStatus;
            if (!branchId) {
              dbStatus = hasMigrations
                ? '⚠️ Supabase branch creation failed — check logs'
                : 'ℹ️ No migrations in this PR';
            } else if (pushOutcome === 'success' || pushOutcome === 'skipped') {
              dbStatus = '✅ Supabase preview branch active — migrations applied';
            } else {
              dbStatus = '⚠️ Supabase preview branch created but migration push failed — check logs';
            }

            const body = [
              '## Preview Environment',
              '',
              '**Web:** Vercel preview auto-deployed via GitHub integration',
              `**Database:** ${dbStatus}`,
              '',
              '---',
              '_Auto-generated by PR Preview workflow_'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Clean up Supabase preview branch when PR closes
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Delete preview branch
        run: |
          BRANCH_NAME="pr-${{ github.event.number }}"
          BRANCH_ID=$(supabase branches list \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --output json | jq -r ".[] | select(.name == \"$BRANCH_NAME\") | .id" 2>/dev/null || echo "")

          if [ -n "$BRANCH_ID" ]; then
            echo "Deleting Supabase branch $BRANCH_ID ($BRANCH_NAME)"
            supabase branches delete "$BRANCH_ID"
          else
            echo "No Supabase branch found for $BRANCH_NAME — nothing to clean up"
          fi
