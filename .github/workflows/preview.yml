name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Vercel GitHub integration handles preview deploys automatically.
# This workflow just posts a comment linking to the preview.
jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Preview Environment',
              '',
              '**Web:** Vercel preview deploy triggered automatically by GitHub integration.',
              'Check the "Deployments" section or Vercel bot comment below for the URL.',
              '',
              '---',
              '_Auto-generated by PR Preview workflow_'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
