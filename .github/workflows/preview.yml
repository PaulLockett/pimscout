name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck lint build

  preview:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Vercel preview deploy
      - name: Deploy to Vercel Preview
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web

      # Railway PR environment
      - name: Create Railway PR Environment
        if: github.event.action == 'opened'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npx @railway/cli environment create pr-${{ github.event.number }} 2>/dev/null || true

      - name: Deploy Workers to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npx @railway/cli link --environment pr-${{ github.event.number }} 2>/dev/null || true
          npx @railway/cli up 2>/dev/null || true

      # Post comment with preview URLs
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const vercelUrl = '${{ steps.vercel.outputs.preview-url }}';
            const body = [
              '## Preview Environment',
              '',
              `**Web:** ${vercelUrl || 'Pending Vercel setup'}`,
              `**Workers:** Railway PR environment \`pr-${{ github.event.number }}\``,
              '',
              '---',
              '_Auto-generated by PR Preview workflow_'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
