name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  # Create/update Supabase preview branch and push migrations
  supabase-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Create or reset preview branch
        id: branch
        run: |
          BRANCH_NAME="pr-${{ github.event.number }}"

          # Check if branch already exists
          EXISTING=$(supabase branches list --output json | jq -r ".[] | select(.git_branch == \"$BRANCH_NAME\") | .id" 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Resetting existing branch $EXISTING"
            supabase branches reset "$EXISTING"
            echo "branch_id=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "Creating new branch $BRANCH_NAME"
            RESULT=$(supabase branches create "$BRANCH_NAME" --output json 2>&1 || true)
            BRANCH_ID=$(echo "$RESULT" | jq -r '.id // empty' 2>/dev/null || echo "")
            if [ -z "$BRANCH_ID" ]; then
              echo "::warning::Could not create Supabase branch. Output: $RESULT"
              echo "branch_id=" >> "$GITHUB_OUTPUT"
            else
              echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Push migrations to preview branch
        if: steps.branch.outputs.branch_id != ''
        run: |
          if ls supabase/migrations/*.sql 1>/dev/null 2>&1; then
            supabase db push --linked
          else
            echo "No migrations to push"
          fi
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Comment PR with preview info
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const branchId = '${{ steps.branch.outputs.branch_id }}';
            const hasMigrations = ${{ hashFiles('supabase/migrations/*.sql') != '' }};
            const dbStatus = branchId
              ? '✅ Supabase preview branch active — migrations applied'
              : (hasMigrations ? '⚠️ Supabase branch creation failed — check logs' : 'ℹ️ No migrations in this PR');

            const body = [
              '## Preview Environment',
              '',
              '**Web:** Vercel preview auto-deployed via GitHub integration',
              `**Database:** ${dbStatus}`,
              '',
              '---',
              '_Auto-generated by PR Preview workflow_'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Preview Environment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Clean up Supabase preview branch when PR closes
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Delete preview branch
        run: |
          BRANCH_NAME="pr-${{ github.event.number }}"
          BRANCH_ID=$(supabase branches list \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --output json | jq -r ".[] | select(.git_branch == \"$BRANCH_NAME\") | .id" 2>/dev/null || echo "")

          if [ -n "$BRANCH_ID" ]; then
            echo "Deleting Supabase branch $BRANCH_ID ($BRANCH_NAME)"
            supabase branches delete "$BRANCH_ID"
          else
            echo "No Supabase branch found for $BRANCH_NAME — nothing to clean up"
          fi
