name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  check:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck lint build

  provision-redis:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      rest_url: ${{ steps.provision.outputs.rest_url }}
      rest_token: ${{ steps.provision.outputs.rest_token }}
    steps:
      - name: Provision Upstash Redis for PR
        id: provision
        env:
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
        run: |
          DB_NAME="pimscout-pr-${{ github.event.pull_request.number }}"

          # Check if database already exists
          EXISTING=$(curl -s -u "$UPSTASH_EMAIL:$UPSTASH_API_KEY" \
            https://api.upstash.com/v2/redis/databases | \
            jq -r ".[] | select(.database_name == \"$DB_NAME\")")

          if [ -n "$EXISTING" ]; then
            echo "Database $DB_NAME already exists, reusing"
            REST_URL="https://$(echo "$EXISTING" | jq -r '.endpoint')"
            REST_TOKEN=$(echo "$EXISTING" | jq -r '.rest_token')
          else
            echo "Creating database $DB_NAME"
            RESPONSE=$(curl -s -u "$UPSTASH_EMAIL:$UPSTASH_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DB_NAME\", \"region\": \"us-east-1\", \"tls\": true}" \
              https://api.upstash.com/v2/redis/database)
            REST_URL="https://$(echo "$RESPONSE" | jq -r '.endpoint')"
            REST_TOKEN=$(echo "$RESPONSE" | jq -r '.rest_token')
          fi

          echo "::add-mask::$REST_TOKEN"
          echo "::add-mask::$REST_URL"

          echo "rest_url=$REST_URL" >> "$GITHUB_OUTPUT"
          echo "rest_token=$REST_TOKEN" >> "$GITHUB_OUTPUT"
          echo "Preview Redis provisioned: $DB_NAME"

  test:
    needs: [check, provision-redis]
    if: |
      always() &&
      needs.check.result == 'success' &&
      (needs.provision-redis.result == 'success' || needs.provision-redis.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ needs.provision-redis.outputs.rest_url || secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ needs.provision-redis.outputs.rest_token || secrets.UPSTASH_REDIS_REST_TOKEN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test

  cleanup-redis:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Upstash Redis for PR
        env:
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
        run: |
          DB_NAME="pimscout-pr-${{ github.event.pull_request.number }}"

          DB_ID=$(curl -s -u "$UPSTASH_EMAIL:$UPSTASH_API_KEY" \
            https://api.upstash.com/v2/redis/databases | \
            jq -r ".[] | select(.database_name == \"$DB_NAME\") | .database_id")

          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "Database $DB_NAME not found, nothing to clean up"
            exit 0
          fi

          echo "Deleting database $DB_NAME ($DB_ID)"
          curl -s -u "$UPSTASH_EMAIL:$UPSTASH_API_KEY" \
            -X DELETE \
            "https://api.upstash.com/v2/redis/database/$DB_ID"
          echo "Preview Redis deleted: $DB_NAME"
